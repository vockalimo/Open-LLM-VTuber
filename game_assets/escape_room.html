<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿偵的密室逃脫 — 保全室</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 頂部狀態列 ── */
  #status-bar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    flex-shrink: 0;
  }
  #status-bar .game-title {
    font-weight: 700;
    color: #58a6ff;
    font-size: 15px;
  }
  #stage-badge {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: #8b949e;
  }
  #stage-badge.active { border-color: #388bfd; color: #79c0ff; }
  #stage-badge.completed { border-color: #3fb950; color: #56d364; }

  /* ── 主體：場景 + 阿偵 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 場景區 ── */
  #scene {
    flex: 1;
    position: relative;
    background: #0d1117;
    overflow: hidden;
  }

  /* 場景背景 */
  #scene-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 60%, rgba(30, 40, 60, 0.9) 0%, transparent 70%),
      linear-gradient(180deg, #0a0e17 0%, #111927 100%);
  }
  /* 場景標題 */
  #scene-title {
    position: absolute;
    top: 16px;
    left: 16px;
    font-size: 12px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── 互動物件 ── */
  .clue-object {
    position: absolute;
    cursor: pointer;
    border-radius: 12px;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    background: rgba(22, 27, 34, 0.85);
    backdrop-filter: blur(4px);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .clue-object:hover {
    border-color: #388bfd;
    transform: scale(1.04);
    box-shadow: 0 6px 28px rgba(56, 139, 253, 0.3);
  }
  .clue-object.discovered { border-color: #3fb950; }
  .clue-object .clue-thumb {
    width: 100%;
    height: 80px;
    object-fit: cover;
    display: block;
    background: #1c2128;
  }
  .clue-object .clue-label {
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    color: #cdd9e5;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .clue-object .clue-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6e7681;
  }
  .clue-object.discovered .clue-label .dot { background: #3fb950; }

  /* 物件位置 */
  #obj-whiteboard  { left: 6%;  top: 15%; width: 140px; }
  #obj-intercom    { left: 6%;  top: 52%; width: 140px; }
  #obj-access-log  { left: 24%; top: 20%; width: 140px; }
  #obj-door-lock   { left: 24%; top: 57%; width: 140px; }

  /* 密碼鎖 */
  #door-lock-panel {
    position: absolute;
    right: 4%;
    top: 50%;
    transform: translateY(-50%);
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 20px;
    width: 200px;
    text-align: center;
  }
  #door-lock-panel h3 {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  #code-display {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .code-digit {
    width: 36px; height: 44px;
    background: #21262d;
    border: 1.5px solid #30363d;
    border-radius: 8px;
    font-size: 22px;
    font-weight: 700;
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .code-digit.filled { border-color: #388bfd; color: #79c0ff; }
  .code-digit.wrong  { border-color: #f85149; color: #f85149; animation: shake 0.3s; }
  .code-digit.correct { border-color: #3fb950; color: #56d364; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-4px); }
    75%     { transform: translateX(4px); }
  }
  #numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .numpad-btn {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 16px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .numpad-btn:hover { background: #30363d; border-color: #58a6ff; }
  .numpad-btn:active { transform: scale(0.95); }
  .numpad-btn.del { color: #f85149; font-size: 14px; }
  #lock-status {
    font-size: 12px;
    color: #8b949e;
    min-height: 18px;
  }
  #lock-status.success { color: #3fb950; }
  #lock-status.error   { color: #f85149; }

  /* ── 線索 Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }
  #lightbox.show { display: flex; }
  #lightbox img {
    max-width: 720px;
    max-height: 70vh;
    border-radius: 12px;
    border: 1px solid #30363d;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    object-fit: contain;
  }
  #lightbox-caption {
    color: #8b949e;
    font-size: 13px;
    text-align: center;
  }
  #lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 24px;
    cursor: pointer;
    transition: color 0.2s;
  }
  #lightbox-close:hover { color: #e6edf3; }

  /* ── 阿偵側邊欄 ── */
  #detective-panel {
    width: 300px;
    background: #0d1117;
    border-left: 1px solid #21262d;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #live2d-area {
    height: 220px;
    background: linear-gradient(180deg, #111927 0%, #0d1117 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    border-bottom: 1px solid #21262d;
    position: relative;
    overflow: hidden;
  }
  #live2d-area iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .detective-fallback {
    text-align: center;
  }
  .detective-fallback p {
    font-size: 11px;
    color: #6e7681;
    margin-top: 4px;
  }

  /* 對話區 */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: #30363d transparent;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 100%;
  }
  .msg.detective {
    background: #161b22;
    border: 1px solid #21262d;
    color: #cdd9e5;
    align-self: flex-start;
  }
  .msg.player {
    background: #1f3244;
    border: 1px solid #1b4b72;
    color: #79c0ff;
    align-self: flex-end;
    text-align: right;
  }
  .msg .sender {
    font-size: 10px;
    font-weight: 600;
    color: #6e7681;
    margin-bottom: 3px;
  }

  /* 輸入區 */
  #input-area {
    padding: 12px;
    border-top: 1px solid #21262d;
    display: flex;
    gap: 8px;
  }
  #chat-input {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #chat-input:focus { border-color: #388bfd; }
  #chat-input::placeholder { color: #6e7681; }
  #send-btn {
    background: #238636;
    border: 1px solid #2ea043;
    border-radius: 8px;
    color: #fff;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  #send-btn:hover { background: #2ea043; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  /* 開始遊戲覆蓋層 */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13, 17, 23, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 40px;
  }
  #start-overlay h1 { font-size: 28px; font-weight: 700; color: #e6edf3; }
  #start-overlay p  { font-size: 14px; color: #8b949e; max-width: 400px; line-height: 1.6; }
  #start-overlay .detective-icon { font-size: 80px; }
  #start-btn {
    background: #238636;
    border: 1px solid #2ea043;
    border-radius: 10px;
    color: #fff;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  #start-btn:hover { background: #2ea043; transform: scale(1.03); }
</style>
</head>
<body>

<!-- 頂部狀態列 -->
<div id="status-bar">
  <span class="game-title">🔍 阿偵的密室逃脫</span>
  <span id="stage-badge">尚未開始</span>
</div>

<!-- 主體 -->
<div id="main">

  <!-- 場景區 -->
  <div id="scene">
    <div id="scene-bg"></div>
    <div id="scene-title">保全監控室 / Security Control Room</div>

    <!-- 互動物件：白板 -->
    <div class="clue-object" id="obj-whiteboard" onclick="showClue('whiteboard')">
      <img class="clue-thumb" src="/game/escape/clue-whiteboard.jpg"
           onerror="this.style.background='#1c2128';this.alt='📋'" alt="白板線索圖">
      <div class="clue-label">
        <span class="dot"></span>白板
      </div>
    </div>

    <!-- 互動物件：對講機 -->
    <div class="clue-object" id="obj-intercom" onclick="showClue('intercom')">
      <img class="clue-thumb" src="/game/escape/clue-intercom.jpg"
           onerror="this.style.background='#1c2128'" alt="對講機線索圖">
      <div class="clue-label">
        <span class="dot"></span>對講機
      </div>
    </div>

    <!-- 互動物件：刷卡記錄 -->
    <div class="clue-object" id="obj-access-log" onclick="showClue('access-log')">
      <img class="clue-thumb" src="/game/escape/clue-access-log.jpg"
           onerror="this.style.background='#1c2128'" alt="刷卡記錄圖">
      <div class="clue-label">
        <span class="dot"></span>刷卡記錄
      </div>
    </div>

    <!-- 互動物件：密碼鎖 -->
    <div class="clue-object" id="obj-door-lock" onclick="toggleLock()">
      <img class="clue-thumb" src="/game/escape/clue-door-open.jpg"
           onerror="this.style.background='#1c2128'" alt="密碼鎖圖">
      <div class="clue-label">
        <span class="dot"></span>密碼鎖
      </div>
    </div>

    <!-- 密碼輸入面板 -->
    <div id="door-lock-panel">
      <h3>🔐 緊急覆寫碼</h3>
      <div id="code-display">
        <div class="code-digit" id="d0">_</div>
        <div class="code-digit" id="d1">_</div>
        <div class="code-digit" id="d2">_</div>
        <div class="code-digit" id="d3">_</div>
      </div>
      <div id="numpad">
        <button class="numpad-btn" onclick="pressKey('1')">1</button>
        <button class="numpad-btn" onclick="pressKey('2')">2</button>
        <button class="numpad-btn" onclick="pressKey('3')">3</button>
        <button class="numpad-btn" onclick="pressKey('4')">4</button>
        <button class="numpad-btn" onclick="pressKey('5')">5</button>
        <button class="numpad-btn" onclick="pressKey('6')">6</button>
        <button class="numpad-btn" onclick="pressKey('7')">7</button>
        <button class="numpad-btn" onclick="pressKey('8')">8</button>
        <button class="numpad-btn" onclick="pressKey('9')">9</button>
        <button class="numpad-btn del" onclick="pressKey('del')">⌫</button>
        <button class="numpad-btn" onclick="pressKey('0')">0</button>
        <button class="numpad-btn" onclick="pressKey('enter')" style="color:#3fb950">✓</button>
      </div>
      <div id="lock-status">輸入 4 位密碼</div>
    </div>

    <!-- 開始遊戲覆蓋層 -->
    <div id="start-overlay">
      <span class="detective-icon">🕵️</span>
      <h1>阿偵的密室逃脫</h1>
      <p>你被鎖在保全監控室裡！<br>
         找到 4 位數的緊急覆寫碼，才能打開那扇門。<br>
         阿偵會用「提問」幫助你，但不會直接給答案喔！</p>
      <button id="start-btn" onclick="startGame()">🔍 開始解謎！</button>
    </div>
  </div>

  <!-- 阿偵側邊欄 -->
  <div id="detective-panel">
    <!-- Live2D 區域（iframe 嵌入主 VTuber UI，或 fallback emoji） -->
    <div id="live2d-area">
      <div class="detective-fallback">
        <div>🕵️</div>
        <p>阿偵</p>
      </div>
    </div>

    <!-- 對話記錄 -->
    <div id="chat-area">
      <div class="msg detective">
        <div class="sender">阿偵</div>
        按下「開始解謎」，阿偵就來陪你囉！
      </div>
    </div>

    <!-- 輸入框 -->
    <div id="input-area">
      <input type="text" id="chat-input" placeholder="輸入你的發現或問題..." 
             onkeydown="if(event.key==='Enter')sendMessage()" disabled>
      <button id="send-btn" onclick="sendMessage()" disabled>送出</button>
    </div>
  </div>
</div>

<!-- 線索 Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<script>
// ── 遊戲狀態 ──────────────────────────────────
const CORRECT_CODE = '4312'
let currentCode = ''
let gameActive = false

// 線索資訊
const CLUE_INFO = {
  'whiteboard': {
    img: '/game/escape/clue-whiteboard.jpg',
    caption: '白板 — 緊急覆寫碼計算規則',
    hint: '仔細看！位置 2 和位置 3 的空格要去哪裡找？',
    obj: 'obj-whiteboard',
  },
  'intercom': {
    img: '/game/escape/clue-intercom.jpg',
    caption: '對講機 — 按下可聯絡外面的保全',
    hint: '保全說：「我是今天的值班保全，工號 3 號。」',
    obj: 'obj-intercom',
  },
  'access-log': {
    img: '/game/escape/clue-access-log.jpg',
    caption: '門禁刷卡記錄 — 最後一筆異常記錄',
    hint: '注意看：異常刷卡是「凌晨 1 時 47 分」',
    obj: 'obj-access-log',
  },
}

// WebSocket（連接主 VTuber server 的阿偵 AI）
let ws = null
const WS_URL = `ws://${location.hostname}:12393/client-ws`

function connectWS() {
  try {
    ws = new WebSocket(WS_URL)
    ws.onopen = () => console.log('✅ WS 連線成功')
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data)
        if (msg.type === 'ai-response' || msg.type === 'text') {
          addMessage('detective', msg.text || msg.content || '')
        }
      } catch { /* 非 JSON，忽略 */ }
    }
    ws.onerror = () => console.warn('⚠️ WS 連線失敗，使用本地模式')
    ws.onclose = () => { ws = null }
  } catch { ws = null }
}

function sendToWS(text) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'user-input', text }))
    return true
  }
  return false
}

// ── UI 函式 ──────────────────────────────────
function addMessage(role, text) {
  const area = document.getElementById('chat-area')
  const div = document.createElement('div')
  div.className = `msg ${role}`
  div.innerHTML = `<div class="sender">${role === 'detective' ? '🕵️ 阿偵' : '你'}</div>${escapeHtml(text)}`
  area.appendChild(div)
  area.scrollTop = area.scrollHeight
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function updateStageBadge(text, cls = '') {
  const badge = document.getElementById('stage-badge')
  badge.textContent = text
  badge.className = cls ? `${cls}` : ''
}

// ── 互動物件 ──────────────────────────────────
function showClue(key) {
  if (!gameActive && key !== 'whiteboard') {
    addMessage('detective', '先開始遊戲，再來查線索吧！')
    return
  }
  const clue = CLUE_INFO[key]
  if (!clue) return

  // 標記為已查看
  document.getElementById(clue.obj)?.classList.add('discovered')

  // 顯示 lightbox
  document.getElementById('lightbox-img').src = clue.img
  document.getElementById('lightbox-caption').textContent = clue.caption
  document.getElementById('lightbox').classList.add('show')

  // 通知阿偵
  if (gameActive) {
    const msg = `（我查看了：${clue.caption}）`
    addMessage('player', msg)
    if (!sendToWS(msg)) {
      // fallback：顯示線索提示
      setTimeout(() => addMessage('detective', `📌 ${clue.hint}`), 500)
    }
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show')
}

function toggleLock() {
  // 讓密碼鎖面板閃一下
  document.getElementById('door-lock-panel').style.boxShadow = '0 0 20px rgba(56,139,253,0.6)'
  setTimeout(() => {
    document.getElementById('door-lock-panel').style.boxShadow = ''
  }, 600)
}

// ── 密碼鎖 ──────────────────────────────────
function pressKey(k) {
  if (!gameActive) return
  if (k === 'del') {
    currentCode = currentCode.slice(0, -1)
  } else if (k === 'enter') {
    checkCode()
    return
  } else if (currentCode.length < 4 && /[0-9]/.test(k)) {
    currentCode += k
  }
  updateCodeDisplay()
}

function updateCodeDisplay() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`d${i}`)
    if (currentCode[i]) {
      d.textContent = currentCode[i]
      d.className = 'code-digit filled'
    } else {
      d.textContent = '_'
      d.className = 'code-digit'
    }
  }
}

function checkCode() {
  if (currentCode.length < 4) {
    setLockStatus('還差 ' + (4 - currentCode.length) + ' 位數字', 'error')
    return
  }
  if (currentCode === CORRECT_CODE) {
    // 成功！
    for (let i = 0; i < 4; i++) {
      document.getElementById(`d${i}`).className = 'code-digit correct'
    }
    setLockStatus('✅ 已解鎖！門打開了！', 'success')
    updateStageBadge('🎉 恭喜逃脫！', 'completed')
    addMessage('player', '我輸入密碼 4312，門開了！')
    sendToWS('密碼是4312！我輸入了 4312，門打開了！')
    // 顯示門打開的圖
    setTimeout(() => {
      document.getElementById('lightbox-img').src = '/game/escape/clue-door-open.jpg'
      document.getElementById('lightbox-caption').textContent = '🎉 成功！緊急覆寫碼正確，門打開了！'
      document.getElementById('lightbox').classList.add('show')
    }, 800)
  } else {
    // 錯誤
    for (let i = 0; i < 4; i++) {
      document.getElementById(`d${i}`).className = 'code-digit wrong'
    }
    setLockStatus('❌ 密碼錯誤，再想想！', 'error')
    addMessage('player', `我試了密碼 ${currentCode}，但是錯的。`)
    sendToWS(`我輸入了密碼 ${currentCode}，但是錯的。`)
    setTimeout(() => {
      currentCode = ''
      updateCodeDisplay()
      setLockStatus('輸入 4 位密碼', '')
    }, 1200)
  }
}

function setLockStatus(text, cls) {
  const el = document.getElementById('lock-status')
  el.textContent = text
  el.className = cls
}

// ── 開始遊戲 ──────────────────────────────────
function startGame() {
  document.getElementById('start-overlay').style.display = 'none'
  document.getElementById('chat-input').disabled = false
  document.getElementById('send-btn').disabled = false
  gameActive = true
  updateStageBadge('第 1 關 — 觀察', 'active')

  connectWS()
  // 送觸發詞給阿偵
  setTimeout(() => {
    const trigger = '密室逃脫，開始遊戲！'
    addMessage('player', trigger)
    if (!sendToWS(trigger)) {
      // WS 不可用時的 fallback 開場白
      setTimeout(() => addMessage('detective',
        '嘿！我是阿偵！你被鎖在保全室裡了～\n' +
        '你看看四周，有什麼東西可能跟「密碼」有關係呢？\n' +
        '（提示：牆上有一塊白板喔！）'), 600)
    }
  }, 300)
}

// ── 玩家輸入 ──────────────────────────────────
function sendMessage() {
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if (!text) return
  input.value = ''
  addMessage('player', text)
  if (!sendToWS(text)) {
    // WS fallback：簡單回應
    setTimeout(() => addMessage('detective', '嗯嗯～你說得有道理！那你覺得下一步應該去哪裡找線索？'), 600)
  }
}

// 鍵盤快捷鍵
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox()
  if (document.activeElement === document.getElementById('chat-input')) return
  if (gameActive && /^[0-9]$/.test(e.key)) pressKey(e.key)
  if (gameActive && e.key === 'Backspace') pressKey('del')
  if (gameActive && e.key === 'Enter') pressKey('enter')
})
</script>
